<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🌈 快乐阅读🌈</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #fff1e6 0%, #fde2c4 100%);
            font-family: 'Comic Neue', 'Chalkboard SE', 'Comic Sans MS', 'Segoe UI Emoji', cursive, sans-serif;
            padding: 24px 20px;
            min-height: 100vh;
        }

        .deco {
            position: fixed;
            pointer-events: none;
            z-index: 0;
            font-size: 80px;
            opacity: 0.2;
            user-select: none;
        }
        .deco1 { top: 20px; left: 10px; transform: rotate(-10deg); }
        .deco2 { bottom: 30px; right: 20px; transform: rotate(15deg); }
        .deco3 { top: 40%; right: 5%; font-size: 60px; }

        .dashboard {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            gap: 24px;
            position: relative;
            z-index: 2;
            flex-wrap: wrap;
        }

        /* 左侧目录区 */
        .story-toc {
            flex: 0 0 280px;
            background: rgba(255, 252, 235, 0.96);
            backdrop-filter: blur(4px);
            border-radius: 56px;
            box-shadow: 0 20px 35px rgba(255, 120, 60, 0.2);
            padding: 24px 12px 28px 16px;
            border: 2px solid #ffefcf;
            height: fit-content;
            position: sticky;
            top: 24px;
        }

        .toc-header {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #b45f2b;
            background: #FFE0A3;
            padding: 8px 18px;
            border-radius: 60px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .toc-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 70vh;
            overflow-y: auto;
            padding-right: 6px;
        }

        .toc-list::-webkit-scrollbar {
            width: 6px;
        }
        .toc-list::-webkit-scrollbar-track {
            background: #ffefcf;
            border-radius: 10px;
        }
        .toc-list::-webkit-scrollbar-thumb {
            background: #F7A55A;
            border-radius: 10px;
        }

        .toc-item {
            background: #FFF6E8;
            border-radius: 48px;
            padding: 8px 16px;
            font-weight: bold;
            font-size: 0.9rem;
            color: #8B4A2A;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 2px solid #ffe0ba;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toc-item:hover {
            background: #FFE0A3;
            transform: translateX(6px);
            border-color: #F7A55A;
        }

        .toc-item.active {
            background: #FBCA77;
            border-color: #F58A2E;
            color: #5a2e0e;
            box-shadow: 0 4px 10px rgba(245, 138, 46, 0.2);
        }

        .toc-icon {
            font-size: 1.3rem;
        }
        .story-count-badge {
            font-size: 0.7rem;
            background: #ffd7a5;
            border-radius: 30px;
            padding: 2px 8px;
            margin-left: auto;
        }

        /* 右侧内容区 */
        .content-main {
            flex: 1;
            min-width: 280px;
            background: rgba(255, 254, 245, 0.94);
            backdrop-filter: blur(3px);
            border-radius: 72px;
            box-shadow: 0 25px 45px rgba(255, 120, 60, 0.2);
            padding: 20px 28px 40px;
            border: 3px solid #ffefcf;
        }

        .hero {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
            background: #fff3e0;
            border-radius: 80px;
            padding: 8px 20px;
        }
        .title-box h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #F97316, #FBBF24);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .title-box p {
            font-size: 0.8rem;
            background: #ffefcf;
            border-radius: 40px;
            padding: 4px 16px;
            color: #b45f2b;
        }
        .tips {
            background: #FFE0A3;
            border-radius: 40px;
            padding: 6px 18px;
            font-size: 0.8rem;
            font-weight: bold;
            color: #8B4513;
        }

        .story-section {
            background: #FFFBF0;
            border-radius: 56px;
            margin-bottom: 20px;
            padding: 12px 22px 28px;
            box-shadow: 0 12px 20px rgba(251, 146, 60, 0.15);
            border: 1px solid #ffe0b5;
        }
        .story-title {
            font-size: 1.8rem;
            font-weight: bold;
            background: #FBCA77;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 6px 28px;
            margin: 8px 0 20px 0;
            border-radius: 100px;
            color: #844d29;
            box-shadow: 0 6px 0 #E1A451;
        }

        .question-card {
            background: #fffaf2;
            border-radius: 48px;
            margin-bottom: 24px;
            padding: 18px 22px;
            border: 2px solid #ffdcac;
        }
        .question-text {
            font-weight: 800;
            font-size: 1.1rem;
            margin-bottom: 16px;
            color: #B45F2B;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .q-num {
            background: #FFAD60;
            border-radius: 60px;
            padding: 4px 16px;
            color: white;
            font-size: 0.8rem;
        }

        .options-area {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 12px;
            background: #FFF3E6;
            padding: 12px 16px;
            border-radius: 60px;
        }
        .option-btn {
            background: #FCE6C4;
            border: 2px solid #FFC489;
            border-radius: 60px;
            padding: 6px 18px;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.15s ease;
            color: #7b3f00;
            font-family: inherit;
        }
        .option-btn:hover {
            background: #FFD9A5;
            transform: scale(0.97);
        }
        .option-correct-feedback {
            background: #b9e6b3 !important;
            border-color: #2e7d32 !important;
            color: #1a4d1a;
        }
        .option-wrong-feedback {
            background: #ffe0e0 !important;
            border-color: #d32f2f !important;
            color: #a12222;
            text-decoration: line-through;
        }
        .feedback-msg {
            font-size: 0.8rem;
            margin: 5px 0 12px 12px;
            padding: 5px 12px;
            border-radius: 30px;
            display: inline-block;
            font-weight: bold;
        }
        .feedback-correct {
            background: #c8e6c9;
            color: #1e5a1e;
        }
        .feedback-wrong {
            background: #ffdddd;
            color: #b53b3b;
        }
        
        .answer-zone {
            margin-top: 8px;
            border-top: 2px dotted #ffe0b0;
            padding-top: 14px;
        }
        .answer-block {
            display: inline-block;
            background: #FFE3B5;
            border: 3px dashed #F7A55A;
            border-radius: 60px;
            padding: 8px 28px;
            min-width: 180px;
            text-align: center;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #A35213;
        }
        .answer-block:hover {
            background: #FFD18C;
            transform: scale(0.97);
        }
        .answer-show-style {
            background: #C5E0B4 !important;
            border: 3px solid #479c2c !important;
            color: #2a5c1a !important;
        }

        .action-bar {
            text-align: center;
            margin: 20px 0 10px;
        }
        .reset-btn {
            background: #FFA559;
            border: none;
            font-size: 1.1rem;
            font-weight: bold;
            padding: 10px 32px;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 7px 0 #C46F1A;
            transition: 0.07s linear;
        }
        .reset-btn:active {
            transform: translateY(3px);
            box-shadow: 0 4px 0 #C46F1A;
        }
        .story-progress {
            text-align: center;
            font-size: 0.8rem;
            margin-top: 16px;
            color: #c28142;
            background: #fff2e2;
            display: inline-block;
            padding: 4px 20px;
            border-radius: 40px;
        }
        @media (max-width: 800px) {
            .dashboard { flex-direction: column; }
            .story-toc { flex: auto; position: relative; top: 0; width: 100%; }
            .toc-list { max-height: 260px; flex-direction: row; flex-wrap: wrap; justify-content: center; }
            .toc-item { width: auto; padding: 6px 12px; }
        }
        @media (max-width: 650px) {
            .content-main { padding: 16px; }
            .story-title { font-size: 1.3rem; }
            .option-btn { padding: 4px 12px; font-size: 0.8rem; }
        }
    </style>
</head>

let totalQuestions = 0;

// 状态存储
let answerVisibleMap = new Map();
let currentStoryIndex = 0;

function renderStoryByIndex(storyIdx) {
    const container = document.getElementById('dynamic-story-area');
    if(!container) return;
    const story = storiesData[storyIdx];
    if(!story) return;
    
    let html = `<div class="active-story-container"><div class="story-section"><div class="story-title">${story.name}  (${story.items.length}题)</div>`;
    for(let qIdx = 0; qIdx < story.items.length; qIdx++) {
        const q = story.items[qIdx];
        const qid = `q_${storyIdx}_${qIdx}`;
        if(!answerVisibleMap.has(qid)) answerVisibleMap.set(qid, false);
        
        let optsHtml = '';
        q.options.forEach(opt => {
            const optLetter = opt.charAt(0);
            optsHtml += `<button class="option-btn" data-qid="${qid}" data-value="${optLetter}">${opt}</button>`;
        });
        
        html += `
            <div class="question-card" id="card-${qid}">
                <div class="question-text"><span class="q-num">${qIdx+1}</span> ${q.text}</div>
                <div class="options-area" id="opts-${qid}">
                    ${optsHtml}
                </div>
                <div class="feedback-msg" id="fb-${qid}"></div>
                <div class="answer-zone">
                    <div class="answer-block" data-qid="${qid}" data-answer="${q.answer}">点击显示答案</div>
                </div>
            </div>
        `;
    }
    html += `</div></div>`;
    container.innerHTML = html;
    
    // 绑定选项事件
    document.querySelectorAll('.option-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const qid = btn.getAttribute('data-qid');
            const selectedVal = btn.getAttribute('data-value');
            const answerBlock = document.querySelector(`.answer-block[data-qid="${qid}"]`);
            const correctAnswer = answerBlock ? answerBlock.getAttribute('data-answer') : '';
            const feedbackDiv = document.getElementById(`fb-${qid}`);
            const parentOpts = document.getElementById(`opts-${qid}`);
            if(parentOpts) {
                parentOpts.querySelectorAll('.option-btn').forEach(opt => opt.classList.remove('option-correct-feedback', 'option-wrong-feedback'));
            }
            if(selectedVal === correctAnswer) {
                btn.classList.add('option-correct-feedback');
                feedbackDiv.innerHTML = '🎉 完全正确！ 好厉害！ 🎉';
                feedbackDiv.className = 'feedback-msg feedback-correct';
            } else {
                btn.classList.add('option-wrong-feedback');
                let correctText = '';
                if(parentOpts) {
                    for(let b of parentOpts.querySelectorAll('.option-btn')) {
                        if(b.getAttribute('data-value') === correctAnswer) { correctText = b.innerText; break; }
                    }
                }
                feedbackDiv.innerHTML = `再试试～ 正确答案是 ${correctAnswer}. ${correctText.replace(correctAnswer+'.','')} 加油哟！`;
                feedbackDiv.className = 'feedback-msg feedback-wrong';
            }
        });
    });
    
    // 绑定答案区块
    document.querySelectorAll('.answer-block').forEach(block => {
        block.addEventListener('click', (e) => {
            e.stopPropagation();
            const qid = block.getAttribute('data-qid');
            const correctAnsLetter = block.getAttribute('data-answer');
            const isVisible = answerVisibleMap.get(qid) || false;
            if(!isVisible) {
                let fullAnswerText = correctAnsLetter;
                const parentCard = document.getElementById(`card-${qid}`);
                if(parentCard) {
                    for(let opt of parentCard.querySelectorAll('.option-btn')) {
                        if(opt.getAttribute('data-value') === correctAnsLetter) {
                            fullAnswerText = opt.innerText;
                            break;
                        }
                    }
                }
                block.innerHTML = `✅ 答案：${fullAnswerText} ✅`;
                block.classList.add('answer-show-style');
                answerVisibleMap.set(qid, true);
            } else {
                block.innerHTML = '点击显示答案';
                block.classList.remove('answer-show-style');
                answerVisibleMap.set(qid, false);
            }
        });
    });
    
    document.getElementById('storyProgress').innerHTML = `📖 当前：${story.name} ｜ 共 ${story.items.length} 道智慧题`;
}

function buildToc() {
    const tocContainer = document.getElementById('tocListContainer');
    tocContainer.innerHTML = '';
    storiesData.forEach((story, idx) => {
        const tocItem = document.createElement('div');
        tocItem.className = 'toc-item';
        if(idx === currentStoryIndex) tocItem.classList.add('active');
        const icon = story.name.split(' ')[0] || '📖';
        tocItem.innerHTML = `<div class="toc-icon">${icon}</div><div>${story.name}</div><span class="story-count-badge">${story.items.length}</span>`;
        tocItem.addEventListener('click', () => {
            currentStoryIndex = idx;
            renderStoryByIndex(currentStoryIndex);
            document.querySelectorAll('.toc-item').forEach(item => item.classList.remove('active'));
            tocItem.classList.add('active');
        });
        tocContainer.appendChild(tocItem);
    });
}

function resetCurrentStory() {
    document.querySelectorAll('.option-btn').forEach(btn => btn.classList.remove('option-correct-feedback', 'option-wrong-feedback'));
    document.querySelectorAll('.feedback-msg').forEach(fb => { fb.innerHTML = ''; fb.className = 'feedback-msg'; });
    document.querySelectorAll('.answer-block').forEach(block => {
        const qid = block.getAttribute('data-qid');
        if(qid && answerVisibleMap.has(qid)) answerVisibleMap.set(qid, false);
        block.innerHTML = '点击显示答案';
        block.classList.remove('answer-show-style');
    });
}

renderStoryByIndex(0);
buildToc();
document.getElementById('resetAllBtn').addEventListener('click', resetCurrentStory);
</script>
